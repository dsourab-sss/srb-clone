<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Al Kandora — Booking</title>
    <style>
      :root {
        --bg: #090909;
        --panel: #101010;
        --panel-soft: #141414;
        --line: rgba(200, 169, 106, 0.28);
        --gold: #c8a96a;
        --text: #ffffff;
        --muted: #b9b9b9;
        --muted-soft: #8a8a8a;
        --success: #8fbf8f;
        --pending: #d1b27a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #161616 0%, var(--bg) 45%);
        color: var(--text);
      }

      .app {
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        padding: 26px 18px 30px;
      }

      .brand {
        text-align: center;
        letter-spacing: 0.24em;
        font-size: 0.7rem;
        color: var(--gold);
        text-transform: uppercase;
        margin-bottom: 20px;
      }

      .section {
        background: linear-gradient(180deg, var(--panel) 0%, var(--panel-soft) 100%);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px 16px;
        margin-bottom: 16px;
      }

      .section h2 {
        margin: 0 0 4px;
        font-size: 1.02rem;
        font-weight: 600;
      }

      .section p {
        margin: 0 0 16px;
        color: var(--muted-soft);
        font-size: 0.84rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      label {
        font-size: 0.76rem;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        border: 1px solid rgba(200, 169, 106, 0.26);
        border-radius: 12px;
        background: #0e0e0e;
        color: var(--text);
        padding: 12px 13px;
        font-size: 0.93rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      select:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(200, 169, 106, 0.17);
      }

      .visit-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }

      .visit-toggle button {
        border: 1px solid rgba(200, 169, 106, 0.34);
        border-radius: 10px;
        background: #0d0d0d;
        color: var(--muted);
        font-size: 0.85rem;
        padding: 11px 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .visit-toggle button.active {
        color: var(--text);
        background: rgba(200, 169, 106, 0.16);
        border-color: var(--gold);
      }

      .hidden {
        display: none;
      }

      .btn {
        width: 100%;
        border: 1px solid var(--gold);
        background: linear-gradient(180deg, #d8bb83 0%, #ba9859 100%);
        color: #101010;
        font-size: 0.93rem;
        font-weight: 600;
        border-radius: 12px;
        padding: 13px;
        cursor: pointer;
      }

      .booking-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .booking-card {
        border: 1px solid rgba(200, 169, 106, 0.2);
        background: #0d0d0d;
        border-radius: 12px;
        padding: 13px;
      }

      .booking-main {
        font-weight: 650;
        margin-bottom: 4px;
        font-size: 0.94rem;
      }

      .booking-meta {
        color: var(--muted);
        font-size: 0.83rem;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .status {
        text-transform: uppercase;
        font-size: 0.72rem;
        letter-spacing: 0.05em;
      }

      .status.confirmed {
        color: var(--success);
      }

      .status.pending {
        color: var(--pending);
      }

      @media (min-width: 760px) {
        .app {
          padding-top: 38px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="brand">Al Kandora</header>

      <section class="section" aria-labelledby="new-booking-title">
        <h2 id="new-booking-title">New Booking</h2>
        <p>Reserve your tailoring consultation with refined simplicity.</p>

        <form>
          <div class="field">
            <label for="booking-date">Preferred Date</label>
            <input id="booking-date" type="date" required />
          </div>

          <div class="field">
            <label for="booking-time">Preferred Time</label>
            <input id="booking-time" type="time" required />
          </div>

          <div class="field">
            <label>Visit Type</label>
            <div class="visit-toggle" role="group" aria-label="Visit type selector">
              <button type="button" class="active" data-visit="atelier" aria-pressed="true">Atelier Visit</button>
              <button type="button" data-visit="home" aria-pressed="false">Home Visit</button>
            </div>
          </div>

          <div class="field hidden" id="address-field">
            <label for="address">Home Visit Address</label>
            <input id="address" type="text" placeholder="Villa / Street / Area" />
          </div>

          <button class="btn" type="submit">Confirm Booking</button>
        </form>
      </section>

      <section class="section" aria-labelledby="my-bookings-title">
        <h2 id="my-bookings-title">My Bookings</h2>
        <p>Your upcoming tailoring appointments.</p>

        <div class="booking-list">
          <article class="booking-card">
            <div class="booking-main">Thu, 23 Apr 2026 — 7:00 PM</div>
            <div class="booking-meta">
              <span>Atelier Visit</span>
              <span class="status confirmed">Confirmed</span>
            </div>
          </article>

          <article class="booking-card">
            <div class="booking-main">Mon, 27 Apr 2026 — 5:30 PM</div>
            <div class="booking-meta">
              <span>Home Visit</span>
              <span class="status pending">Pending</span>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script>
      const visitButtons = document.querySelectorAll('[data-visit]');
      const addressField = document.getElementById('address-field');
      const addressInput = document.getElementById('address');

      visitButtons.forEach((button) => {
        button.addEventListener('click', () => {
          visitButtons.forEach((btn) => {
            btn.classList.remove('active');
            btn.setAttribute('aria-pressed', 'false');
          });

          button.classList.add('active');
          button.setAttribute('aria-pressed', 'true');

          const isHomeVisit = button.dataset.visit === 'home';
          addressField.classList.toggle('hidden', !isHomeVisit);
          addressInput.toggleAttribute('required', isHomeVisit);
        });
      });
    </script>
  </body>
</html>
